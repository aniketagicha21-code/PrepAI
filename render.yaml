services:
  - type: web
    name: prepai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    # Repo root so COPY backend/... in Dockerfile resolves (matches Render’s default context)
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGINS
        sync: false
